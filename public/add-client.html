<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Client + Vault Card</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260520-1">
  <link rel="shortcut icon" href="/favicon.ico?v=20260520-1">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260520-1">
  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="WQ2SH2-mr2Ap9-7WxX4J-3gA2D8"
    data-variant="inline"
    data-style-sniffer="true"
    data-country="US"
    data-currency="USD"
    data-price="0.00"
    data-field-apple-pay-selector="#__disableApplePay"
    data-field-google-pay-selector="#__disableGooglePay"
  ></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    input, button { padding: 14px; margin: 10px 0; width: 100%; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .success { color: green; font-weight: bold; }
    .error { color: red; }
    .collect-field { padding: 14px; margin: 10px 0; width: 100%; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background: #fff; }
  </style>
</head>
<body>
  <h1>Add Client + Save Card to NMI Vault</h1>

  <input type="text" id="jwtToken" placeholder="JWT (auto-filled)" autocomplete="off" style="background:#fff3cd;">

  <input type="text" id="firstName" placeholder="First Name" required>
  <input type="text" id="lastName" placeholder="Last Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="tel" id="phone" placeholder="Phone">

  <h3>Card Details</h3>
  <div id="collect-form">
    <div id="ccnumber" class="collect-field" aria-label="Card Number"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div id="ccexp" class="collect-field" aria-label="MMYY"></div>
      <div id="cvv" class="collect-field" aria-label="CVV"></div>
    </div>
  </div>

  <button id="payButton" type="button" onclick="generateToken()">1. Generate Token</button>
  <button id="submitBtn" type="button" onclick="submitForm()" disabled>2. Add Client + Vault Card</button>

  <div id="result" style="margin-top:20px; font-weight:bold; min-height:40px;"></div>
  <div id="__disableApplePay" style="display:none !important;"></div>
  <div id="__disableGooglePay" style="display:none !important;"></div>

  <script>
    let paymentToken = '';
    let jwtToken = '';

    const result = document.getElementById('result');
    const jwtTokenInput = document.getElementById('jwtToken');
    const submitButton = document.getElementById('submitBtn');

    const setSubmitEnabled = () => {
      submitButton.disabled = !(paymentToken && jwtToken);
    };

    const setJwtToken = (token) => {
      jwtToken = String(token || '').trim();
      jwtTokenInput.value = jwtToken;
      if (jwtToken) {
        try { sessionStorage.setItem('vaultJwt', jwtToken); } catch {}
      }
      setSubmitEnabled();
    };

    // Auto-load JWT (priority: postMessage -> sessionStorage -> handoff query string -> jwt query string)
    window.addEventListener('message', (event) => {
      if (!event || event.origin !== 'https://vault.ninjadispute.com') return;
      const data = event.data;
      if (!data || data.type !== 'vaultJwt') return;
      setJwtToken(data.token);
    });

    const tryLoadJwtFromQuery = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const handoff = urlParams.get('handoff');
      if (handoff) {
        fetch(`https://vault.ninjadispute.com/api/auth/handoff/${encodeURIComponent(handoff)}`)
          .then((res) => res.ok ? res.json() : Promise.reject(new Error(`handoff ${res.status}`)))
          .then((data) => {
            if (data && data.token) {
              setJwtToken(data.token);
              try {
                urlParams.delete('handoff');
                const next = `${window.location.pathname}${urlParams.toString() ? `?${urlParams.toString()}` : ''}`;
                window.history.replaceState({}, document.title, next);
              } catch {}
            }
          })
          .catch(() => {
            result.innerHTML = '<span class="error">Handoff token expired. Please login again on vault.</span>';
          });
        return;
      }

      const jwt = urlParams.get('jwt');
      if (jwt) setJwtToken(jwt);
    };

    try {
      const stored = sessionStorage.getItem('vaultJwt');
      if (stored) setJwtToken(stored);
      else tryLoadJwtFromQuery();
    } catch {
      tryLoadJwtFromQuery();
    }

    jwtTokenInput.addEventListener('input', () => setJwtToken(jwtTokenInput.value));

    // Collect.js setup (secure fields). Do not read card values from JS.
    const installCollectJs = () => {
      if (typeof window.CollectJS === 'undefined') {
        result.innerHTML = '<span class="error">Collect.js failed to load. Check console.</span>';
        return;
      }

      window.CollectJS.configure({
        fields: {
          ccnumber: { selector: '#ccnumber', title: 'Card Number' },
          ccexp: { selector: '#ccexp', title: 'MMYY' },
          cvv: { selector: '#cvv', title: 'CVV' },
        },
        callback: function (response) {
          if (response && response.token) {
            paymentToken = response.token;
            setSubmitEnabled();
            result.innerHTML = '<span class="success">✅ Token Generated</span>';
            return;
          }
          paymentToken = '';
          setSubmitEnabled();
          result.innerHTML = '<span class="error">Token Error</span>';
          console.error('CollectJS callback missing token:', response);
        },
      });
    };

    installCollectJs();
    setSubmitEnabled();

    window.generateToken = () => {
      result.textContent = 'Generating secure token...';
      // Clicking the pay button triggers Collect.js inline tokenization.
      document.getElementById('payButton')?.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    };

    window.submitForm = async () => {
      if (!jwtToken) return (result.innerHTML = '<span class="error">❌ Missing JWT — Login first</span>');
      if (!paymentToken) return (result.innerHTML = '<span class="error">❌ Generate token first</span>');

      result.textContent = 'Saving to NMI Vault...';

      const payload = {
        client: {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value || ""
        },
        paymentToken: paymentToken
      };

      try {
        const res = await fetch('https://vault.ninjadispute.com/api/clients/add-with-payment', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${jwtToken}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          result.innerHTML = '<span class="success">🎉 SUCCESS! Client & Card Vaulted</span>';
        } else {
          result.innerHTML = `<span class="error">Error: ${data.error || data.message || res.status}</span>`;
        }
      } catch (err) {
        result.innerHTML = '<span class="error">Request failed</span>';
        console.error(err);
      }
    };
  </script>
</body>
</html>
