<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get New Report Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/tools-ninja-widget.css?v=20260605-03" />
  </head>
  <body>
    <div class="widget-shell">
      <div class="widget-top-row">
        <div class="widget-column widget-column-left">
          <div class="ninja">
            <div class="sword"></div>
            <div class="pants">
              <div class="leg1">
                <div class="legTop leg1Top"></div>
                <div class="legBottom leg1Bottom">
                  <div class="feet foot1"></div>
                  <div class="legBottomSleeve"></div>
                </div>
              </div>
              <div class="leg2">
                <div class="legTop leg2Top"></div>
                <div class="legBottom leg2Bottom">
                  <div class="feet foot2"></div>
                  <div class="legBottomSleeve"></div>
                </div>
              </div>
            </div>
            <div class="torso">
              <div class="arms">
                <div class="arm1">
                  <div class="armTop arm1Top"></div>
                  <div class="armBottom arm1Bottom">
                    <div class="hand hand1"></div>
                    <div class="armBottomSleeve"></div>
                  </div>
                </div>
                <div class="arm2">
                  <div class="armTop arm2Top"></div>
                  <div class="armBottom arm2Bottom">
                    <div class="star"></div>
                    <div class="hand hand2"></div>
                    <div class="armBottomSleeve"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="headBandWrap">
              <div class="headBand headBand1"></div>
              <div class="headBand headBand2"></div>
            </div>
            <div class="noggin">
              <div class="eyeHole">
                <div class="eyeWrap">
                  <div class="eye eyeLeft"></div>
                  <div class="eye eyeRight"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="widget-column widget-column-right">
        <div class="widget-logo-panel">
          <p id="widgetLogoTitle" class="widget-logo-title">Logo Upload</p>
          <label id="widgetLogoUploadLabel" class="widget-logo-upload" for="widgetLogoUpload">
            <span id="widgetLogoUploadText">Choose Logo</span>
            <input id="widgetLogoUpload" type="file" accept="image/*" />
          </label>
          <div class="widget-logo-preview-shell">
            <img id="widgetLogoPreview" class="widget-logo-preview" alt="Uploaded logo preview" hidden />
            <p id="widgetLogoPlaceholder" class="widget-logo-placeholder">Upload a logo to preview it here.</p>
            <label id="widgetLogoMiniUpload" class="widget-logo-mini-upload" for="widgetLogoUpload" hidden aria-label="Change logo">
              ✎
            </label>
          </div>
          <button id="widgetLogoClear" class="widget-logo-clear" type="button" hidden>Clear Logo</button>
        </div>
      </div>
      </div>
      <div class="widget-column widget-column-center">
        <div class="widget-business-name-wrap nameplate-logo">
          <h1 id="widgetBusinessName" data-text="&#xf504; Name of Business">&#xf504; Name of Business</h1>
          <button id="widgetBusinessNameEdit" class="widget-business-name-edit" type="button" aria-label="Edit business name">✎</button>
        </div>
        <div class="widget-status-row">
          <div class="widget-status-grid">
            <div class="widget-status-col widget-status-col-left">
              <div class="widget-refresh-action">
                <div class="widget-refresh-button-wrap">
                  <button id="widgetRefreshGlassButton" class="widget-refresh-button" type="button">
                    <span>Refresh Report</span>
                  </button>
                  <div class="widget-refresh-button-shadow"></div>
                </div>
              </div>
              <div id="widgetConsole" class="widget-console" aria-live="polite"></div>
            </div>
            <div class="widget-status-col widget-status-col-right">
              <div id="widgetConsoleVersion" class="widget-console-version">v2.68 loaded</div>
              <div id="widgetRefreshSummary" class="widget-refresh-summary" hidden></div>
              <div class="tnw-liquid-shell" aria-label="Widget Navigation">
                <nav class="tnw-liquid-nav" id="tnwNav">
                  <div class="tnw-liquid-glare-container">
                    <div class="tnw-liquid-glare" id="tnwGlare"></div>
                  </div>
                  <div class="tnw-nav-items">
                    <div class="tnw-active-pill" id="tnwActivePill"></div>
                    <button class="tnw-nav-btn active" data-action="home" type="button">
                      <span class="tnw-btn-content">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                          <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Home</span>
                      </span>
                    </button>
                    <button class="tnw-nav-btn" data-action="add" type="button">
                      <span class="tnw-btn-content">
                        <i class="fa-solid fa-plus"></i>
                        <span>Add</span>
                      </span>
                    </button>
                    <button class="tnw-nav-btn" data-action="contacts" type="button">
                      <span class="tnw-btn-content">
                        <i class="fa-solid fa-user"></i>
                        <span>Contacts</span>
                      </span>
                    </button>
                  </div>
                  <div class="tnw-divider" aria-hidden="true"></div>
                  <button class="tnw-theme-btn" id="tnwThemeBtn" type="button" aria-label="Toggle theme">
                    <svg class="tnw-theme-icon tnw-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="5"></circle>
                      <line x1="12" y1="1" x2="12" y2="3"></line>
                      <line x1="12" y1="21" x2="12" y2="23"></line>
                      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                      <line x1="1" y1="12" x2="3" y2="12"></line>
                      <line x1="21" y1="12" x2="23" y2="12"></line>
                      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                  </button>
                </nav>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/tools-ninja-widget.js?v=20260605-03"></script>
  </body>
</html>
