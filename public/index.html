<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ninja Tools</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      min-height: 100vh;
    }
    body.login-mode {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 28px; color: #333; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 14px; margin-bottom: 2rem; }
    .divider { margin: 2rem 0; color: #999; font-size: 12px; }
    .btn-google {
      width: 100%;
      padding: 12px;
      background: white;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-google:hover { background: #f9f9f9; border-color: #ccc; }
    #dashboard { display: none; }
    #dashboard.show { display: block !important; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Only run on main page, NOT in iframes
    if (window.self === window.top) {
      const OAuth = {
        initialized: false,
        dashboardLoaded: false,

        init: function() {
          if (this.initialized) return;
          this.initialized = true;

          console.log("🔐 NinjaTools OAuth - INIT");
          this.handleSSO() || this.checkAuth();
        },

        handleSSO: function() {
          const ssoToken = new URLSearchParams(window.location.search).get("sso_token");
          if (!ssoToken) return false;

          console.log("🔐 SSO Token detected - attempting login");
          
          const attempt = (retry = 0) => {
            fetch("/api/auth/sso-login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token: ssoToken }),
              credentials: "include"
            })
            .then(r => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.json();
            })
            .then(data => {
              if (data.authenticated) {
                console.log("✅ SSO successful");
                window.history.replaceState({}, "", "/");
                this.showDashboard();
              } else {
                // Retry up to 3 times with 500ms delay
                if (retry < 3) {
                  console.log(`⏳ Retry ${retry + 1}/3 in 500ms...`);
                  setTimeout(() => attempt(retry + 1), 500);
                } else {
                  console.warn("❌ SSO failed after retries");
                  this.checkAuth();
                }
              }
            })
            .catch(e => {
              if (retry < 3) {
                console.log(`⏳ Error, retry ${retry + 1}/3 in 500ms: ${e.message}`);
                setTimeout(() => attempt(retry + 1), 500);
              } else {
                console.error("❌ SSO error after retries:", e);
                this.checkAuth();
              }
            });
          };

          attempt();
          return true;
        },

        checkAuth: function() {
          fetch("/api/auth/status", { credentials: "include" })
            .then(r => r.json())
            .then(data => {
              if (data.authenticated) {
                console.log("✅ AUTHENTICATED");
                this.showDashboard();
              } else {
                console.log("❌ NOT AUTHENTICATED - Showing login");
                this.showLogin();
              }
            })
            .catch(e => {
              console.error("Auth check error:", e);
              this.showLogin();
            });
        },

        showLogin: function() {
          document.body.classList.add("login-mode");
          document.getElementById("app").innerHTML = `
            <div class="login-box">
              <h1>🥷 Ninja Tools</h1>
              <p>Credit Dispute Management System</p>
              <div class="divider">SIGN IN WITH</div>
              <a href="https://auth.ninjadispute.com/login?provider=google&redirect=https://ninjacore.ninjadispute.com" class="btn-google">
                <i class="fab fa-google"></i> Sign in with Google
              </a>
            </div>
          `;
        },

        showDashboard: function() {
          document.body.classList.remove("login-mode");
          this.loadDashboard();
        },

        loadDashboard: function() {
          if (this.dashboardLoaded) return;
          this.dashboardLoaded = true;

          console.log("📦 Opening dashboard page so scripts can run...");
          window.location.replace("/dashboard.html");
        }
      };

      // Single initialization - MAIN PAGE ONLY
      OAuth.init();
    }
  </script>
</body>
</html>
